lang: "{{LANG}}"

# Section cross-references render as "§ N.M" (a hyperlink in HTML).
# Tag a heading with `{#sec-slug}` and reference it with `@sec-slug`
# in body text — avoids hard-coded numbers that break on reordering.
crossref:
  sec-prefix: "§"

format:
  html:
    theme:
      - cosmo
      - brand.scss
      - shared/base.scss
    toc:                true
    toc-depth:          3
    number-sections:    true
    smooth-scroll:      true
    # Mermaid's default theme renders dark-blue text on a grey node fill that is
    # hard to read against the brand surface; `neutral` is the grayscale theme.
    mermaid:
      theme: neutral
  orange-book-typst:
    output-file:      "{{PROJECT_NAME}}.pdf"
    number-sections:  true
    toc:              true
    toc-depth:        2
    template-partials:
      - shared/typst-show.typ
